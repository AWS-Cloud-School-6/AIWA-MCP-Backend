<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>자격 증명 업데이트</title>
</head>
<body>
<h1>자격 증명 업데이트</h1>

<form action="/api/members/update-credentials" method="post">
  <label for="email">이메일:</label>
  <input type="email" id="email" name="email" required><br>

  <label for="access_key">Access Key:</label>
  <input type="text" id="access_key" name="access_key" required><br>

  <label for="secret_key">Secret Key:</label>
  <input type="text" id="secret_key" name="secret_key" required><br>

  <button type="submit">자격 증명 업데이트</button>
</form>

<a href="/">홈으로 돌아가기</a>
</body>
</html>
