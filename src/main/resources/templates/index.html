<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cloud Management Dashboard</title>
</head>
<body>
<h1>멀티클라우드 관리 플랫폼</h1>

<!-- 로그인된 사용자 정보가 있는 경우 -->
<div th:if="${email != 'anonymous'}">
    <h2>환영합니다!</h2>
    <p>사용자 이메일: <span th:text="${email}"></span></p>

    <ul>
        <li><a th:href="@{/api/vpc/list(userId=${email})}">VPC 관리</a></li>
        <li><a th:href="@{/api/subnet/list(userId=${email})}">Subnet 관리</a></li>
        <li><a href="/security-group">Security Group 관리</a></li>
        <li><a href="/ec2">EC2 인스턴스 관리</a></li>
        <li><a href="/keypair">Key Pair 관리</a></li>
        <li><a href="/cloudwatch">CloudWatch 알람 관리</a></li>
        <li><a href="/api/members/update-credentials">자격 증명 업데이트</a></li> <!-- 자격 증명 업데이트 링크 추가 -->
    </ul>

    <!-- 로그아웃 버튼 -->
    <form action="/api/members/logout" method="get">
        <button type="submit">로그아웃</button>
    </form>
</div>

<!-- 로그인되지 않은 경우 -->
<div th:if="${email == 'anonymous'}">
    <p>로그인되지 않았습니다. <a href="/api/members/login">로그인</a> 후 서비스를 이용하세요.</p>
    <p><a href="/api/members/register">회원가입</a></p>
</div>

</body>
</html>
